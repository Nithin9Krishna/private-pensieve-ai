<style>
        body {
            background-color: #101419;
            color: #e0e2ea;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(18, 25, 35, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .privacy-glow {
            box-shadow: 0 0 40px rgba(167, 139, 250, 0.1);
        }
        .orb-gradient {
            background: radial-gradient(circle at center, #A78BFA, #7C5CFC);
        }
        @keyframes pulse-slow {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor (Suppressing Full Shell for Onboarding) -->
<header class="docked full-width top-0 flex justify-between items-center w-full px-container-margin py-6 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-headline-md text-headline-md font-bold text-primary">Pensieve</span>
</div>
<div class="text-on-surface-variant font-label-md text-label-md">2 of 3</div>
</header>
<main class="min-h-screen flex flex-col items-center justify-center px-container-margin pt-20 pb-32 relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute top-1/4 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-secondary/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Central Visualization Canvas -->
<div class="w-full max-w-lg flex flex-col items-center text-center space-y-stack-gap-lg">
<!-- The Privacy Visual Component -->
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Outer Aura -->
<div class="absolute inset-0 rounded-full bg-primary/5 privacy-glow border border-primary/20 animate-pulse-slow"></div>
<!-- Shield/Vault Representation -->
<div class="relative z-10 glass-card w-32 h-32 rounded-3xl flex items-center justify-center shadow-2xl overflow-hidden">
<div class="absolute inset-0 orb-gradient opacity-10"></div>
<span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'FILL' 1;">encrypted</span>
</div>
<!-- Floating Data Nodes (Local Only Representation) -->
<div class="absolute top-0 right-4 w-4 h-4 rounded-full bg-secondary shadow-[0_0_10px_#62d9cc]"></div>
<div class="absolute bottom-8 left-0 w-3 h-3 rounded-full bg-primary/40 shadow-[0_0_10px_#cebdff]"></div>
</div>
<!-- Textual Content -->
<div class="space-y-stack-gap-md px-4">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight">
                    Private by Default.
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto leading-relaxed">
                    Your thoughts are processed and stored only on <span class="text-secondary font-medium">this device</span>. No cloud. No servers. No one else can access them.
                </p>
</div>
<!-- Mechanism Details Bento-ish Layout -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-stack-gap-md w-full mt-8">
<div class="glass-card p-6 rounded-2xl flex flex-col items-center gap-2 border-outline-variant/20">
<span class="material-symbols-outlined text-primary mb-2">memory</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant">Local Compute</span>
</div>
<div class="glass-card p-6 rounded-2xl flex flex-col items-center gap-2 border-outline-variant/20">
<span class="material-symbols-outlined text-primary mb-2">cloud</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant">Zero Sync</span>
</div>
<div class="glass-card p-6 rounded-2xl flex flex-col items-center gap-2 border-outline-variant/20">
<span class="material-symbols-outlined text-primary mb-2">lock_person</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant">Solo Access</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Anchor (Contextual Suppression of Main Nav) -->
<footer class="fixed bottom-0 left-0 w-full p-container-margin z-50 flex flex-col items-center bg-gradient-to-t from-background via-background/90 to-transparent pt-12">
<button class="w-full max-w-md bg-primary text-on-primary py-4 rounded-full font-headline-md text-headline-md shadow-xl hover:opacity-90 transition-all active:scale-[0.98] focus:ring-4 focus:ring-primary/30">
            Continue
        </button>
<p class="mt-4 font-label-sm text-label-sm text-outline-variant/60">
            Secure on-device encryption active
        </p>
</footer>
<script>
        // Micro-interactions for the "Local Only" nodes
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const nodes = document.querySelectorAll('.rounded-full.bg-secondary, .rounded-full.bg-primary\\/40');
            nodes.forEach((node, index) => {
                const speed = (index + 1) * 20;
                const offsetX = (x - 0.5) * speed;
                const offsetY = (y - 0.5) * speed;
                node.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });
        });
    </script>
</body></html>
