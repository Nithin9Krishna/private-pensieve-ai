<style>
        body {
            background-color: #0B0F14;
            color: #e0e2ea;
            overflow: hidden;
        }

        .pensieve-orb {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #A78BFA, #7C5CFC);
            position: relative;
            filter: drop-shadow(0 0 20px rgba(167, 139, 250, 0.3));
            animation: orb-pulse 6s ease-in-out infinite;
        }

        .orb-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.15) 0%, transparent 70%);
            filter: blur(20px);
            z-index: -1;
        }

        @keyframes orb-pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .glass-panel {
            background: rgba(18, 25, 35, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-1 { animation-delay: 0.2s; }
        .stagger-2 { animation-delay: 0.4s; }
        .stagger-3 { animation-delay: 0.6s; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen font-body-md bg-background text-on-background">
<!-- Top App Bar (Suppressed for Onboarding as per Filter rules, but keeping a minimalist version for identity) -->
<header class="flex justify-between items-center w-full px-container-margin py-4 top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-headline-md text-headline-md font-bold text-primary">Pensieve</span>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin text-center relative overflow-hidden">
<!-- Background Atmospheric Element (Optional WebGL Placeholder) -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">
<!-- Simulated ambient glow using CSS instead of heavy textures -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
</div>
<div class="z-10 flex flex-col items-center space-y-stack-gap-lg max-w-lg">
<!-- The Pensieve Orb Component -->
<div class="relative mb-8 fade-in">
<div class="pensieve-orb">
<div class="orb-glow"></div>
<!-- Inner swirling effect simulation -->
<div class="absolute inset-0 rounded-full overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-transparent rotate-45 animate-[pulse_4s_infinite]"></div>
</div>
</div>
</div>
<!-- Content -->
<div class="space-y-stack-gap-md">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background fade-in stagger-1">
                    Your thoughts, kept for you.
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto leading-relaxed fade-in stagger-2">
                    An offline, private memory companion that stays entirely on your device.
                </p>
</div>
<!-- Privacy Indicators -->
<div class="flex gap-stack-gap-md pt-4 fade-in stagger-2">
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-secondary/30 bg-secondary/5">
<span class="material-symbols-outlined text-secondary text-[18px]">verified_user</span>
<span class="text-label-sm font-label-sm text-secondary uppercase tracking-widest">Local-only</span>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-outline-variant/30 bg-white/5">
<span class="material-symbols-outlined text-outline text-[18px]">cloud_off</span>
<span class="text-label-sm font-label-sm text-outline uppercase tracking-widest">Offline</span>
</div>
</div>
</div>
</main>
<!-- Navigation/Action Area -->
<footer class="px-container-margin pb-16 flex flex-col items-center gap-6 z-20">
<button class="w-full max-w-xs py-4 px-8 rounded-full bg-primary-container text-on-primary-container font-headline-md text-headline-md shadow-lg shadow-primary/10 hover:opacity-90 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group fade-in stagger-3" onclick="window.location.reload()">
            Continue
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="text-label-sm font-label-sm text-outline-variant fade-in stagger-3">
            By continuing, you acknowledge that your data never leaves this device.
        </p>
</footer>
<!-- Atmosphere Micro-interaction Layer -->
<script>
        // Simple ambient cursor follow for subtle depth
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.orb-glow');
            if (!glow) return;
            
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            
            document.querySelector('.pensieve-orb').style.transform = `translate(${x}px, ${y}px) scale(1)`;
        });

        // Reduced motion accessibility
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.querySelectorAll('.fade-in').forEach(el => {
                el.style.animation = 'none';
                el.style.opacity = '1';
            });
            document.querySelector('.pensieve-orb').style.animation = 'none';
        }
    </script>
</body></html>
