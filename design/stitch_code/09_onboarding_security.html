<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pensieve - Secure Your Memories</title>

      tailwind.config = {

                    "on-background": "#e0e2ea",

                    "surface-container-lowest": "#0a0e13",
                    "surface-container": "#1c2025",
                    "on-error": "#690005",
                    "primary-container": "#a78bfa",
                    "secondary": "#62d9cc",
                    "surface-tint": "#cebdff",
                    "on-primary-fixed-variant": "#4f319c",
                    "surface-dim": "#101419",
                    "on-primary": "#381385",
                    "on-tertiary-fixed": "#1c0062",
                    "surface": "#101419",
                    "surface-container-highest": "#31353b",
                    "secondary-container": "#11a296",
                    "on-secondary-fixed-variant": "#00504a",
                    "background": "#101419",

                    "tertiary-fixed-dim": "#cabeff",
                    "surface-variant": "#31353b",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "error": "#ffb4ab",
                    "on-secondary": "#003733",
                    "on-tertiary-container": "#3600a4",
                    "inverse-surface": "#e0e2ea",
                    "on-primary-container": "#3c1989",
                    "on-surface": "#e0e2ea",
                    "secondary-fixed-dim": "#62d9cc",
                    "tertiary": "#cabeff",
                    "secondary-fixed": "#80f6e8",
                    "surface-container-low": "#181c21",
                    "surface-bright": "#36393f",
                    "on-surface-variant": "#cac4d4",
                    "tertiary-container": "#a18cff",
                    "tertiary-fixed": "#e6deff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap-sm": "8px",
                    "grid-gutter": "16px",
                    "stack-gap-lg": "32px",
                    "stack-gap-md": "16px",
                    "container-margin": "24px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "display": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],

                    "headline-lg-mobile": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {

                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],

                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .privacy-glow {
            box-shadow: 0 0 20px 0 rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .orb-pulse {
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .key-active:active {
            background-color: #1E2A38;
            transform: scale(0.95);
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(18, 25, 35, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-x-hidden">
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-50 bg-background dark:bg-background flex justify-between items-center w-full px-container-margin py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">Pensieve</span>
</div>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin pt-24 pb-32">
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
</div>
<div class="relative z-10 w-full max-w-md flex flex-col items-center gap-stack-gap-lg">
<!-- Secure Orb Visual -->
<div class="relative w-24 h-24 mb-4">
<div class="absolute inset-0 bg-gradient-to-tr from-[#A78BFA] to-[#7C5CFC] rounded-full orb-pulse opacity-20 blur-xl"></div>
<div class="relative w-full h-full bg-gradient-to-tr from-[#A78BFA] to-[#7C5CFC] rounded-full flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<!-- Header Section -->
<div class="text-center space-y-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background">Secure Your Memories</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                    Set a local passcode to keep your vault private. We'll also use biometrics for faster access.
                </p>
</div>
<!-- Passcode Display Indicators -->
<div class="flex gap-4 my-4" id="passcode-indicators">
<div class="w-4 h-4 rounded-full border-2 border-outline-variant"></div>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant"></div>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant"></div>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant"></div>
</div>
<!-- Biometrics Toggle -->
<div class="w-full glass rounded-xl p-4 flex items-center justify-between privacy-glow">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">fingerprint</span>
<div>
<p class="font-label-md text-label-md text-on-surface">Enable Biometrics</p>
<p class="text-[12px] text-on-surface-variant">Face ID or Touch ID</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<!-- Keypad -->
<div class="grid grid-cols-3 gap-x-8 gap-y-4 w-full px-4">
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(1)">1</button>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(2)">2</button>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(3)">3</button>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(4)">4</button>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(5)">5</button>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(6)">6</button>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(7)">7</button>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(8)">8</button>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(9)">9</button>
<div class="h-16"></div>
<button class="h-16 flex items-center justify-center font-headline-md text-headline-md text-on-surface key-active rounded-full transition-all" onclick="updateDots(0)">0</button>
<button class="h-16 flex items-center justify-center text-on-surface-variant key-active rounded-full transition-all" onclick="clearDots()">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-background/80 backdrop-blur-md px-container-margin pb-10 pt-4 flex flex-col gap-4">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md h-14 rounded-full flex items-center justify-center gap-2 opacity-50 cursor-not-allowed transition-all duration-300 active:scale-95" id="continue-btn">
            Continue
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<p class="text-center text-[12px] text-on-surface-variant/60 font-label-sm">
            Encryption is local. Pensieve never stores your passcode.
        </p>
</div>
<script>
        let currentPasscode = "";
        const indicators = document.getElementById('passcode-indicators').children;
        const continueBtn = document.getElementById('continue-btn');

        function updateDots(num) {
            if (currentPasscode.length < 4) {
                currentPasscode += num;
                renderDots();
            }
        }

        function clearDots() {
            currentPasscode = currentPasscode.slice(0, -1);
            renderDots();
        }

        function renderDots() {
            for (let i = 0; i < indicators.length; i++) {
                if (i < currentPasscode.length) {
                    indicators[i].classList.add('bg-primary', 'border-primary');
                    indicators[i].classList.remove('border-outline-variant');
                } else {
                    indicators[i].classList.remove('bg-primary', 'border-primary');
                    indicators[i].classList.add('border-outline-variant');
                }
            }

            if (currentPasscode.length === 4) {
                continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                continueBtn.classList.add('shadow-[0_0_15px_rgba(167,139,250,0.3)]');
                continueBtn.disabled = false;
            } else {
                continueBtn.classList.add('opacity-50', 'cursor-not-allowed');
                continueBtn.classList.remove('shadow-[0_0_15px_rgba(167,139,250,0.3)]');
                continueBtn.disabled = true;
            }
        }

        // Add subtle hover effect for glass elements
        document.querySelectorAll('.glass').forEach(el => {
            el.addEventListener('mousemove', (e) => {
                const rect = el.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                el.style.setProperty('--mouse-x', `${x}px`);
                el.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
</body></html>
