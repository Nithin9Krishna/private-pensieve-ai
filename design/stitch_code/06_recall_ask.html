<script>
        // Simple micro-interaction for the search bar
        const searchInput = document.querySelector('input');
        const searchContainer = searchInput.closest('.glass-panel');

        searchInput.addEventListener('focus', () => {
            searchContainer.style.boxShadow = "0 0 30px rgba(167, 139, 250, 0.15)";
            searchContainer.style.borderColor = "rgba(167, 139, 250, 0.4)";
        });

        searchInput.addEventListener('blur', () => {
            searchContainer.style.boxShadow = "0 0 20px rgba(167, 139, 250, 0.05)";
            searchContainer.style.borderColor = "rgba(255, 255, 255, 0.05)";
        });

        // Add ripple effect logic (simulated for listening)
        const micBtn = document.querySelector('button .material-symbols-outlined[content="mic"]')?.parentElement;
        if (micBtn) {
            micBtn.addEventListener('mousedown', () => {
                micBtn.classList.add('scale-110');
                micBtn.style.boxShadow = "0 0 40px rgba(167, 139, 250, 0.6)";
            });
            micBtn.addEventListener('mouseup', () => {
                micBtn.classList.remove('scale-110');
                micBtn.style.boxShadow = "0 10px 15px -3px rgba(167, 139, 250, 0.2)";
            });
        }
    </script>
