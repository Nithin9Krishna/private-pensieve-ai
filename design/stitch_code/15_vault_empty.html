<script>
        // Simple micro-interaction for the illustration parallax or hover effect
        document.addEventListener('mousemove', (e) => {
            const sanctuary = document.querySelector('.group');
            if (!sanctuary) return;
            
            const rect = sanctuary.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const moveX = (e.clientX - centerX) / 40;
            const moveY = (e.clientY - centerY) / 40;
            
            sanctuary.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
